# ─── Nginx Reverse Proxy para ITO Cloud + CORPMDM ────────────────────────────
# Enruta todo el trafico en puerto 80 a los diferentes servicios
# Estructura:
#   http://129.151.98.129/appito/     → ITO Web (Blazor)
#   http://129.151.98.129/apiito/     → ITO API (.NET)
#   http://129.151.98.129/minioito/   → ITO MinIO Console
#   http://129.151.98.129/s3ito/      → ITO MinIO S3 API
#   http://129.151.98.129/mdm/        → CORPMDM Web
#   http://129.151.98.129/mdmapi/     → CORPMDM API

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─ Logging ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ─ Rendimiento ─────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ─ Timeouts para conexiones largas (importante para Blazor) ────────────────
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_connect_timeout 60s;

    # ─ Upstream services (servicios internos de ITO) ────────────────────────────
    upstream api_backend {
        server localhost:8080;
    }

    upstream web_backend {
        server localhost:8081;
    }

    upstream minio_backend {
        server localhost:9001;
    }

    upstream minio_s3_backend {
        server localhost:9000;
    }

    # ─ Upstream services (CORPMDM existente) ───────────────────────────────────
    upstream corpmdm_api_backend {
        server 127.0.0.1:15000;
    }

    upstream corpmdm_web_backend {
        server 127.0.0.1:15010;
    }

    # ─ Upstream services (AgendaMedica existente) ─────────────────────────────
    upstream agenda_web_backend {
        server 127.0.0.1:5020;
    }

    # ─ Server principal (Puerto 80) ────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        client_max_body_size 100M;

        # ─ Health check (para Docker) ──────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location = / {
            access_log off;
            return 301 /appito/;
        }

        location = /appito {
            return 301 /appito/;
        }

        location = /apiito {
            return 301 /apiito/;
        }

        location = /minioito {
            return 301 /minioito/;
        }

        location = /s3ito {
            return 301 /s3ito/;
        }

        # ─ API (.NET) - Ruta: /apiito/* ──────────────────────────────────────
        location /apiito/ {
            proxy_pass http://api_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ─ MinIO S3 API - Ruta: /s3ito/* ─────────────────────────────────────
        location /s3ito/ {
            proxy_pass http://minio_s3_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # ─ MinIO Console - Ruta: /minioito/* ─────────────────────────────────
        location /minioito/ {
            proxy_pass http://minio_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Upgrade $http_upgrade;
        }

        # ─ WebSocket para Blazor Server - Ruta: /appito/_blazor* ─────────────
        location /appito/_blazor {
            proxy_pass http://web_backend/_blazor;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─ Assets estaticos de Blazor - Ruta: /appito/_framework* ────────────
        location /appito/_framework/ {
            proxy_pass http://web_backend/_framework/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, immutable";
        }

        # ─ Web (Blazor) - Ruta: /appito/* ─────────────────────────────────────
        location /appito/ {
            proxy_pass http://web_backend/;
            proxy_http_version 1.1;
            proxy_redirect ~^/(.*)$ /appito/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Importante para Blazor: permitir cambios de protocolo
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ─ Deny acceso a archivos de sistema ───────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ────────────────────────────────────────────────────────────────────────
        # ─ CORPMDM Routes (Existing Stack) ─────────────────────────────────────
        # ────────────────────────────────────────────────────────────────────────

        location = /mdm {
            return 301 /mdm/;
        }

        location = /mdmapi {
            return 301 /mdmapi/;
        }

        # ─ CORPMDM API - Ruta: /mdmapi/* ──────────────────────────────────────
        location /mdmapi/ {
            proxy_pass http://corpmdm_api_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ─ CORPMDM Web - Ruta: /mdm/* ─────────────────────────────────────────
        location /mdm/ {
            proxy_pass http://corpmdm_web_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ────────────────────────────────────────────────────────────────────────
        # ─ AgendaMedica Routes (Existing Stack) ────────────────────────────────
        # ────────────────────────────────────────────────────────────────────────

        location = /appagenda {
            return 301 /appagenda/;
        }

        # ─ AgendaMedica Web - Ruta: /appagenda/* ──────────────────────────────
        location /appagenda/ {
            proxy_pass http://agenda_web_backend/appagenda/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }
    }
}
